<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Underdog EV Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #090E1A; color: #F1F5F9; font-family: 'Segoe UI', sans-serif; }
    input[type=range] { cursor: pointer; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { opacity: 1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F1A2E; }
    ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const { useState } = React;

// ── Math ──────────────────────────────────────────────────────────────────────
const FORMATS = {
  "2-pick": { n: 2, adjPayouts: [3.5 * 0.995] },
  "3-pick": { n: 3, adjPayouts: [6.5 * 0.995] },
  "6-Flex": { n: 6, adjPayouts: [25 * 0.995, 2.6 * 0.995, 0.25 * 0.995] },
};

function C(n, k) {
  let r = 1;
  for (let i = 0; i < k; i++) r = (r * (n - i)) / (i + 1);
  return r;
}
function calcWinProb(legs, fmt) {
  if (fmt === "6-Flex") return Math.pow(legs[0], 6);
  return legs.reduce((prod, p) => prod * p, 1);
}
function calcEV(winProb, fmt) {
  const { adjPayouts, n } = FORMATS[fmt];
  if (fmt === "6-Flex") {
    const p = Math.pow(winProb, 1 / n);
    return adjPayouts.reduce((s, payout, miss) => s + C(n, miss) * Math.pow(p, n - miss) * Math.pow(1 - p, miss) * payout, 0);
  }
  return winProb * adjPayouts[0];
}
function calcKelly(winProb, fmt) {
  const b = FORMATS[fmt].adjPayouts[0] - 1;
  return Math.max(0, (b * winProb - (1 - winProb)) / b);
}
function calcBreakeven(fmt) {
  const { adjPayouts, n } = FORMATS[fmt];
  if (fmt === "6-Flex") {
    let lo = 0.5, hi = 0.99;
    for (let i = 0; i < 80; i++) {
      const mid = (lo + hi) / 2;
      const ev = adjPayouts.reduce((s, p, miss) => s + C(n, miss) * Math.pow(mid, n - miss) * Math.pow(1 - mid, miss) * p, 0);
      ev < 1 ? (lo = mid) : (hi = mid);
    }
    return (lo + hi) / 2;
  }
  return 1 / adjPayouts[0];
}
function oddsToProb(odds) {
  const o = Number(odds);
  if (isNaN(o) || o === 0) return 0;
  return o < 0 ? Math.abs(o) / (Math.abs(o) + 100) : 100 / (o + 100);
}
function probToOdds(p) {
  if (!p || p <= 0 || p >= 1) return "";
  return p >= 0.5 ? `-${Math.round((p / (1 - p)) * 100)}` : `+${Math.round(((1 - p) / p) * 100)}`;
}
function fmtP(v, d = 2) { return `${Number(v).toFixed(d)}%`; }

// ── Tokens ────────────────────────────────────────────────────────────────────
const AC = "#6EE7B7", BDR = "rgba(255,255,255,0.08)", CARD = "rgba(255,255,255,0.035)";
const RED = "#F87171", PURP = "#A78BFA", GREEN = "#34D399";

// ── Helpers ───────────────────────────────────────────────────────────────────
function s(...args) {
  return Object.assign({}, ...args);
}
const baseCard = { background: CARD, border: `1px solid ${BDR}`, borderRadius: 12, padding: "16px 18px", marginBottom: 14 };
const baseStatBox = { background: "rgba(0,0,0,0.25)", borderRadius: 8, padding: "11px 13px" };
const baseMiniInput = { width: "100%", background: "transparent", border: "none", outline: "none", color: "#F1F5F9", fontSize: 12, padding: "6px 7px", fontFamily: "monospace", fontWeight: 700 };

// ── Components ────────────────────────────────────────────────────────────────
function Card({ children, style }) {
  return e("div", { style: s(baseCard, style || {}) }, children);
}
function SecLabel({ children }) {
  return e("div", { style: { fontSize: 9, letterSpacing: "0.18em", textTransform: "uppercase", color: AC, marginBottom: 12, fontFamily: "monospace" } }, children);
}
function FieldLbl({ children }) {
  return e("div", { style: { fontSize: 10, color: "#64748B", marginBottom: 3 } }, children);
}
function StatBox({ label, value, sub, color }) {
  return e("div", { style: s(baseStatBox, { borderLeft: `3px solid ${color || AC}` }) },
    e("div", { style: { fontSize: 9, color: "#475569", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 } }, label),
    e("div", { style: { fontSize: 17, fontWeight: 800, fontFamily: "monospace", color: color || "#F1F5F9" } }, value),
    sub ? e("div", { style: { fontSize: 9, color: "#475569", marginTop: 2 } }, sub) : null
  );
}
function MiniInput({ value, onChange, suffix, min, max, step, width = 62 }) {
  return e("div", { style: { display: "flex", alignItems: "center", background: "rgba(0,0,0,0.4)", border: `1px solid ${BDR}`, borderRadius: 6, width, overflow: "hidden" } },
    e("input", { type: "number", value, min, max, step, onChange: ev => onChange(ev.target.value), style: baseMiniInput }),
    suffix ? e("span", { style: { paddingRight: 6, color: "#475569", fontSize: 10 } }, suffix) : null
  );
}
function LegInput({ label, pct, odds, onChangePct, onChangeOdds }) {
  return e("div", { style: { background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: "8px 10px", marginBottom: 6 } },
    e("div", { style: { fontSize: 10, color: "#475569", marginBottom: 6 } }, label),
    e("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
      e("div", null,
        e(FieldLbl, null, "Win %"),
        e(MiniInput, { value: pct, onChange: onChangePct, suffix: "%", min: 40, max: 80, step: 0.5, width: 72 })
      ),
      e("div", { style: { color: "#334155", paddingTop: 16, fontSize: 12 } }, "⇄"),
      e("div", null,
        e(FieldLbl, null, "Odds"),
        e(MiniInput, { value: odds, onChange: onChangeOdds, min: -500, max: 500, step: 1, width: 72 })
      ),
      e("div", { style: { paddingTop: 14 } },
        e("div", { style: { fontSize: 9, color: "#475569" } }, "Implied"),
        e("div", { style: { fontFamily: "monospace", fontSize: 12, color: AC, fontWeight: 700 } }, `${(oddsToProb(odds) * 100).toFixed(1)}%`)
      )
    )
  );
}

// ── Slip ──────────────────────────────────────────────────────────────────────
let nextId = 3;
function makeSlip() {
  return { id: nextId++, fmt: "2-pick", active: true, legs: [{ pct: "56", odds: "-127" }, { pct: "56", odds: "-127" }], avgPct: "56", avgOdds: "-127" };
}

function SlipRow({ slip, onChange, onRemove, canRemove, bankroll, kellyFrac }) {
  const { fmt, active, legs, avgPct, avgOdds } = slip;

  function updateLeg(i, field, val) {
    const newLegs = legs.map((l, idx) => {
      if (idx !== i) return l;
      if (field === "pct") return { pct: val, odds: probToOdds(Number(val) / 100) };
      return { odds: val, pct: (oddsToProb(val) * 100).toFixed(1) };
    });
    onChange({ ...slip, legs: newLegs });
  }
  function updateAvgPct(val) { onChange({ ...slip, avgPct: val, avgOdds: probToOdds(Number(val) / 100) }); }
  function updateAvgOdds(val) { onChange({ ...slip, avgOdds: val, avgPct: (oddsToProb(val) * 100).toFixed(1) }); }
  function changeFmt(f) {
    const n = FORMATS[f].n;
    const cur = slip.legs.slice(0, n);
    while (cur.length < n) cur.push({ pct: "56", odds: "-127" });
    onChange({ ...slip, fmt: f, legs: cur });
  }

  const legProbs = fmt === "6-Flex" ? [oddsToProb(avgOdds) || Number(avgPct) / 100] : legs.map(l => oddsToProb(l.odds) || Number(l.pct) / 100);
  const winProb = calcWinProb(legProbs, fmt);
  const ev = winProb > 0 ? calcEV(winProb, fmt) : 0;
  const evNet = (ev - 1) * 100;
  const be = calcBreakeven(fmt);
  const hasEdge = fmt === "6-Flex" ? legProbs[0] > be : winProb > be;
  const kelly = winProb > 0 ? calcKelly(winProb, fmt) * kellyFrac : 0;
  const perSlipBet = Number(bankroll) * kelly;
  const avgPerLeg = fmt !== "6-Flex" ? legs.reduce((s, l) => s + (oddsToProb(l.odds) || Number(l.pct) / 100), 0) / legs.length : legProbs[0];

  const borderColor = active ? (hasEdge ? "rgba(110,231,183,0.2)" : "rgba(239,68,68,0.15)") : BDR;

  return e("div", { style: { background: "rgba(0,0,0,0.2)", border: `1px solid ${borderColor}`, borderRadius: 10, padding: "12px 14px", marginBottom: 10, opacity: active ? 1 : 0.4, transition: "all 0.2s" } },

    // Header
    e("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" } },
      e("button", {
        onClick: () => onChange({ ...slip, active: !active }),
        style: { width: 30, height: 17, borderRadius: 9, border: "none", cursor: "pointer", background: active ? AC : "#1E293B", position: "relative", flexShrink: 0 }
      }, e("span", { style: { position: "absolute", top: 2, left: active ? 13 : 2, width: 13, height: 13, borderRadius: "50%", background: "white", transition: "left 0.2s" } })),

      ...Object.keys(FORMATS).map(f =>
        e("button", {
          key: f, onClick: () => changeFmt(f),
          style: { padding: "4px 11px", borderRadius: 16, border: `1px solid ${fmt === f ? AC : BDR}`, background: fmt === f ? `${AC}15` : "transparent", color: fmt === f ? AC : "#64748B", cursor: "pointer", fontSize: 11, fontWeight: 600 }
        }, f)
      ),

      active && winProb > 0 ? e("span", { style: { marginLeft: "auto", fontSize: 10, padding: "3px 8px", borderRadius: 4, background: hasEdge ? "rgba(110,231,183,0.1)" : "rgba(239,68,68,0.08)", color: hasEdge ? AC : RED, fontFamily: "monospace", fontWeight: 700 } },
        hasEdge ? `+${evNet.toFixed(2)}% EV` : "No edge"
      ) : null,

      canRemove ? e("button", {
        onClick: onRemove,
        style: { background: "none", border: "none", color: "#334155", cursor: "pointer", fontSize: 15, marginLeft: (active && winProb > 0) ? 4 : "auto" }
      }, "✕") : null
    ),

    // Legs
    fmt === "6-Flex"
      ? e(LegInput, { label: "Average per pick", pct: avgPct, odds: avgOdds, onChangePct: updateAvgPct, onChangeOdds: updateAvgOdds })
      : legs.map((leg, i) => e(LegInput, { key: i, label: `Leg ${i + 1}`, pct: leg.pct, odds: leg.odds, onChangePct: v => updateLeg(i, "pct", v), onChangeOdds: v => updateLeg(i, "odds", v) })),

    // Footer stats
    active && winProb > 0 ? e("div", { style: { display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginTop: 10, flexWrap: "wrap", gap: 10 } },
      e("div", null,
        e(FieldLbl, null, "Parlay win prob"),
        e("div", { style: { fontFamily: "monospace", fontSize: 13, color: "#94A3B8", fontWeight: 700 } }, `${(winProb * 100).toFixed(2)}%`),
        e("div", { style: { fontSize: 9, color: "#475569" } }, `avg leg ${(avgPerLeg * 100).toFixed(1)}%`)
      ),
      e("div", { style: { textAlign: "right" } },
        e(FieldLbl, null, "Per-slip bet"),
        e("div", { style: { fontFamily: "monospace", fontSize: 18, fontWeight: 900, color: PURP } }, `$${perSlipBet.toFixed(2)}`),
        e("div", { style: { fontSize: 9, color: "#475569" } }, `${(kelly * 100).toFixed(2)}% of bankroll`)
      )
    ) : null
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [bankroll, setBankroll] = useState(1000);
  const [kellyFrac, setKellyFrac] = useState(0.5);
  const [slips, setSlips] = useState([
    { id: 1, fmt: "2-pick", active: true, legs: [{ pct: "56", odds: "-127" }, { pct: "56", odds: "-127" }], avgPct: "56", avgOdds: "-127" },
    { id: 2, fmt: "3-pick", active: true, legs: [{ pct: "56", odds: "-127" }, { pct: "56", odds: "-127" }, { pct: "56", odds: "-127" }], avgPct: "56", avgOdds: "-127" },
  ]);

  const slipStats = slips.map(s => {
    const legProbs = s.fmt === "6-Flex" ? [oddsToProb(s.avgOdds) || Number(s.avgPct) / 100] : s.legs.map(l => oddsToProb(l.odds) || Number(l.pct) / 100);
    const winProb = calcWinProb(legProbs, s.fmt);
    const ev = winProb > 0 ? calcEV(winProb, s.fmt) : 0;
    const kelly = winProb > 0 ? calcKelly(winProb, s.fmt) * kellyFrac : 0;
    return { legProbs, winProb, ev, evNet: (ev - 1) * 100, kelly, perSlipBet: Number(bankroll) * kelly };
  });

  const activeItems = slips.map((s, i) => ({ s, st: slipStats[i] })).filter(x => x.s.active && x.st.winProb > 0);
  const totalBetDay = activeItems.reduce((sum, { st }) => sum + st.perSlipBet, 0);
  const totalEVProfit = activeItems.reduce((sum, { st }) => sum + st.perSlipBet * (st.ev - 1), 0);
  const roiOnBet = totalBetDay > 0 ? (totalEVProfit / totalBetDay) * 100 : 0;
  const dailyBRgrowth = (totalEVProfit / Number(bankroll)) * 100;

  const updateSlip = (id, updated) => setSlips(prev => prev.map(s => s.id === id ? updated : s));
  const removeSlip = id => setSlips(prev => prev.filter(s => s.id !== id));
  const addSlip = () => setSlips(prev => [...prev, makeSlip()]);

  return e("div", { style: { minHeight: "100vh", background: "#090E1A", color: "#F1F5F9", fontFamily: "'Segoe UI',sans-serif", padding: "20px 14px" } },
    e("div", { style: { maxWidth: 500, margin: "0 auto" } },

      // Header
      e("div", { style: { textAlign: "center", marginBottom: 22 } },
        e("div", { style: { fontSize: 9, letterSpacing: "0.3em", color: AC, fontFamily: "monospace", marginBottom: 5 } }, "UNDERDOG FANTASY"),
        e("h1", { style: { fontSize: 21, fontWeight: 900, color: "#F1F5F9" } }, "EV Calculator")
      ),

      // Settings
      e(Card, null,
        e(SecLabel, null, "Settings"),
        e("div", { style: { display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end" } },
          e("div", null,
            e(FieldLbl, null, "Bankroll"),
            e("div", { style: { display: "flex", alignItems: "center", background: "rgba(0,0,0,0.4)", border: `1px solid ${BDR}`, borderRadius: 7 } },
              e("span", { style: { padding: "0 8px", color: "#475569", fontSize: 13 } }, "$"),
              e("input", { type: "number", value: bankroll, min: 10, step: 50, onChange: ev => setBankroll(ev.target.value), style: { width: 90, background: "transparent", border: "none", outline: "none", color: "#F1F5F9", fontSize: 14, padding: "7px 4px 7px 0", fontFamily: "monospace", fontWeight: 700 } })
            )
          ),
          e("div", { style: { flex: 1, minWidth: 180 } },
            e(FieldLbl, null, `Kelly Fraction: `, e("span", { style: { color: AC, fontFamily: "monospace", fontWeight: 700 } }, `${(kellyFrac * 100).toFixed(0)}%`)),
            e("input", { type: "range", min: 0, max: 1, step: 0.05, value: kellyFrac, onChange: ev => setKellyFrac(Number(ev.target.value)), style: { width: "100%", accentColor: AC, marginTop: 6 } }),
            e("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 9, color: "#334155", marginTop: 2 } },
              e("span", null, "0%"), e("span", null, "½ Kelly (rec.)"), e("span", null, "Full Kelly")
            )
          )
        )
      ),

      // Slips
      e(Card, null,
        e(SecLabel, null, "Daily Slips"),
        ...slips.map((slip, i) => e(SlipRow, { key: slip.id, slip, onChange: updated => updateSlip(slip.id, updated), onRemove: () => removeSlip(slip.id), canRemove: slips.length > 1, bankroll, kellyFrac })),
        e("button", { onClick: addSlip, style: { width: "100%", padding: "9px", borderRadius: 8, border: `1px dashed ${BDR}`, background: "transparent", color: "#475569", cursor: "pointer", fontSize: 12, marginTop: 4 } }, "+ Add Slip")
      ),

      // Day Summary
      e(Card, null,
        e(SecLabel, null, "Day Summary"),
        e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 14 } },
          e(StatBox, { label: "Total Wagered / Day", value: `$${totalBetDay.toFixed(2)}`, sub: "sum of all slip bets" }),
          e(StatBox, { label: "Expected Profit / Day", value: `$${totalEVProfit.toFixed(2)}`, color: totalEVProfit >= 0 ? GREEN : RED, sub: "EV across all slips" }),
          e(StatBox, { label: "ROI on Bet", value: fmtP(roiOnBet, 2), color: AC, sub: "profit ÷ total wagered" }),
          e(StatBox, { label: "Daily BR Growth", value: fmtP(dailyBRgrowth, 3), color: PURP, sub: "profit ÷ bankroll" })
        ),
        e("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 11 } },
          e("thead", null,
            e("tr", { style: { color: "#334155" } },
              e("td", { style: { padding: "4px 6px" } }, "Format"),
              e("td", { style: { padding: "4px 6px", textAlign: "right" } }, "Win prob"),
              e("td", { style: { padding: "4px 6px", textAlign: "right" } }, "Per slip"),
              e("td", { style: { padding: "4px 6px", textAlign: "right" } }, "Net EV%")
            )
          ),
          e("tbody", null,
            ...slips.map((s, i) => {
              if (!s.active) return null;
              const st = slipStats[i];
              const be = calcBreakeven(s.fmt);
              const edge = s.fmt === "6-Flex" ? st.legProbs[0] > be : st.winProb > be;
              return e("tr", { key: s.id, style: { borderTop: `1px solid ${BDR}` } },
                e("td", { style: { padding: "5px 6px", color: "#94A3B8", fontFamily: "monospace", fontSize: 10 } }, s.fmt),
                e("td", { style: { padding: "5px 6px", textAlign: "right", fontFamily: "monospace", color: edge ? AC : RED } }, fmtP(st.winProb * 100, 2)),
                e("td", { style: { padding: "5px 6px", textAlign: "right", fontFamily: "monospace", color: PURP } }, `$${st.perSlipBet.toFixed(2)}`),
                e("td", { style: { padding: "5px 6px", textAlign: "right", fontFamily: "monospace", color: st.evNet >= 0 ? GREEN : RED } }, `${st.evNet >= 0 ? "+" : ""}${st.evNet.toFixed(2)}%`)
              );
            })
          )
        )
      ),

      e("div", { style: { fontSize: 9, color: "#1E293B", textAlign: "center", lineHeight: 1.8 } }, "Payouts adjusted −0.5% for Champions variance · Actual results vary")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
